<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carecadas Estudos</title>
    <style>
      :root {
        --bg: #0f1117;
        --surface: #181a20;
        --card: #1e2029;
        --card-hover: #252733;
        --border: rgba(255,255,255,0.06);
        --text: #e8eaed;
        --muted: #8b95a5;
        --accent: #4ade80;
        --accent-dim: rgba(74,222,128,0.12);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 60px 20px 40px;
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: '';
        position: absolute;
        top: -120px;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(74,222,128,0.08) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
      }

      .chibi {
        width: 180px;
        height: auto;
        filter: drop-shadow(0 8px 32px rgba(74,222,128,0.18));
        animation: float 4s ease-in-out infinite;
        position: relative;
        z-index: 1;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      .hero h1 {
        font-size: 2.2rem;
        font-weight: 800;
        margin: 24px 0 8px;
        letter-spacing: -0.5px;
      }
      .hero h1 span {
        background: linear-gradient(135deg, var(--accent), #22d3ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hero .subtitle {
        color: var(--muted);
        font-size: 1.05rem;
        max-width: 420px;
        line-height: 1.6;
      }

      .content {
        max-width: 720px;
        margin: 0 auto;
        padding: 0 20px 60px;
      }

      .section-label {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 16px;
      }
      .section-label::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .study-list {
        display: grid;
        gap: 12px;
      }

      .study-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        transition: all 0.25s ease;
        text-decoration: none;
        color: var(--text);
      }
      .study-card:hover {
        background: var(--card-hover);
        border-color: rgba(74,222,128,0.2);
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      }

      .study-card .info {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }
      .study-card .icon {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        background: var(--accent-dim);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 1.2rem;
      }
      .study-card .title {
        font-weight: 600;
        font-size: 0.95rem;
      }
      .study-card .title-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .study-card .badge-new {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(74,222,128,0.14);
        border: 1px solid rgba(74,222,128,0.3);
        color: var(--accent);
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .study-card .arrow {
        color: var(--muted);
        font-size: 1.2rem;
        transition: transform 0.2s;
        flex-shrink: 0;
      }
      .study-card:hover .arrow {
        color: var(--accent);
        transform: translateX(4px);
      }

      .footer {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 32px 20px 40px;
        border-top: 1px solid var(--border);
      }
      .footer-brand {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 0.85rem;
        font-weight: 600;
      }
      .footer-brand img {
        width: 28px;
        height: 28px;
      }

      @media (max-width: 480px) {
        .hero { padding: 40px 16px 28px; }
        .chibi { width: 140px; }
        .hero h1 { font-size: 1.7rem; }
        .study-card { padding: 16px 18px; }
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <img src="/chibi.png" alt="Carecadas" class="chibi" />
      <h1>Estudos do <span>Carecão</span></h1>
      <p class="subtitle">Resumos, análises e notas pessoais sobre investimentos e finanças.</p>
    </header>

    <main class="content">
      <div class="section-label">Publicações</div>
      <div class="study-list">
        <a href="/estudos/btc_ciclos.html" class="study-card">
          <div class="info">
            <div class="icon">₿</div>
            <div class="title-row">
              <div class="title">BTC · Análise de Ciclos</div>
              <span class="badge-new">Novo</span>
            </div>
          </div>
          <div class="arrow">→</div>
        </a>
        <a href="/estudos/estudo-investidores-completo.html" class="study-card">
          <div class="info">
            <div class="icon">📊</div>
            <div class="title">Grandes Investidores, Grandes Pumps. Mas quando?</div>
          </div>
          <div class="arrow">→</div>
        </a>
        <a href="/estudos/CaseStudy_Market_Crash_2026.html" class="study-card">
          <div class="info">
            <div class="icon">📉</div>
            <div class="title">Crash de Liquidez com o Triplo IPO</div>
          </div>
          <div class="arrow">→</div>
        </a>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-brand">
        <img src="/logo-serriquinho.png" alt="Ser Riquinho" />
        by Equipa Ser Riquinho
      </div>
    </footer>
  </body>
</html>
