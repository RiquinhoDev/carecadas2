<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carecadas Estudos</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #182230;
        --muted: #5b6b82;
        --accent: #0a7ea4;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Segoe UI, Arial, sans-serif;
        background: linear-gradient(180deg, #eef3fa 0%, var(--bg) 100%);
        color: var(--text);
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      h1 { margin: 0 0 8px; }
      p { margin: 0 0 24px; color: var(--muted); }
      .list {
        display: grid;
        gap: 16px;
      }
      .card {
        background: var(--card);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 8px 24px rgba(19, 36, 59, 0.08);
      }
      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main>
      <h1>Meus Estudos</h1>
      <p>Publicações pessoais. Página em construção contínua.</p>

      <section class="list">
        <article class="card">
          <a href="/estudos/top5-investidores-melhores-compras.html">Top 5 investidores e melhores compras</a>
        </article>
      </section>
    </main>
  </body>
</html>
